name: waaris

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waaris}
      POSTGRES_USER: ${POSTGRES_USER:-waaris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.28
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  migrations:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./infra/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER:-waaris}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-waaris}?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  enrollment:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SERVICE: enrollment }
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-waaris}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-waaris}?sslmode=disable"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?Set AUTH_JWT_SECRET in .env}
    ports: ["${ENROLLMENT_PORT:-8081}:8080"]
    depends_on:
      migrations:
        condition: service_completed_successfully

  auth:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SERVICE: auth }
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-waaris}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-waaris}?sslmode=disable"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?Set AUTH_JWT_SECRET in .env}
    ports: ["${AUTH_PORT:-8080}:8080"]
    depends_on:
      migrations:
        condition: service_completed_successfully

  heartbeat:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SERVICE: heartbeat }
    environment: { HTTP_ADDR: ":8080" }
    ports: ["${HEARTBEAT_PORT:-8082}:8080"]

  notification:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SERVICE: notification }
    environment: { HTTP_ADDR: ":8080" }
    ports: ["${NOTIFICATION_PORT:-8083}:8080"]

  witness-coordination:
    build:
      context: .
      dockerfile: services/Dockerfile
      args: { SERVICE: witness-coordination }
    environment: { HTTP_ADDR: ":8080" }
    ports: ["${WITNESS_COORDINATION_PORT:-8084}:8080"]

  web-dashboard:
    build:
      context: ./apps/web-dashboard
    ports: ["${WEB_PORT:-3000}:8080"]
    depends_on:
      enrollment:
        condition: service_started

volumes:
  postgres-data:
