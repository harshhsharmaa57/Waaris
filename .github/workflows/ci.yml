name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            platform/go.mod
            services/*/go.mod
      - name: Verify formatting
        run: test -z "$(gofmt -l platform services)"
      - name: Test and vet
        run: |
          go test ./platform/... ./services/auth/... ./services/enrollment/... ./services/heartbeat/... ./services/notification/... ./services/witness-coordination/...
          go vet ./platform/... ./services/auth/... ./services/enrollment/... ./services/heartbeat/... ./services/notification/... ./services/witness-coordination/...
      - name: Check known Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./platform/... ./services/auth/... ./services/enrollment/... ./services/heartbeat/... ./services/notification/... ./services/witness-coordination/...
      - name: Build services
        run: |
          for service in auth enrollment heartbeat notification witness-coordination; do
            go build ./services/$service/cmd/server
          done

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web-dashboard/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run build

  containers:
    name: Container build and compose validation
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-only
      AUTH_JWT_SECRET: 12345678901234567890123456789012
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Build images
        run: docker compose build

  database:
    name: PostgreSQL migration and repository checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: waaris
          POSTGRES_USER: waaris
          POSTGRES_PASSWORD: ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waaris -d waaris"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: services/enrollment/go.mod
      - name: Apply migrations and exercise enrollment repository
        env:
          ENROLLMENT_INTEGRATION_DATABASE_URL: postgres://waaris:ci-only@localhost:5432/waaris?sslmode=disable
        run: go test -tags=integration ./services/enrollment/internal/infrastructure/postgres/...
